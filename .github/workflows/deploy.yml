name: Build Project

on:
  push:
    branches:
      - main # Apnar default branch jodi 'master' hoy, tahole ekhane 'master' likhben
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install pnpm (Matching your package.json version)
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      # 3. Set up Node.js with pnpm cache enabled
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'pnpm'

      # 4. Install dependencies using pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # 5. Run the build script
      - name: Build Project
        run: pnpm run build
