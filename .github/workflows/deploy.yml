name: Deploy

on:
  push:
    branches:
      - develop  # Deploy to staging
      - main     # Deploy to production
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PNPM_VERSION: 10.4.1
  NODE_VERSION: 20
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: develop
            environment: staging
            url: ${{ secrets.STAGING_URL }}
          - branch: main
            environment: production
            url: ${{ secrets.PRODUCTION_URL }}
    if: github.ref == format('refs/heads/{0}', matrix.branch) || github.event_name == 'workflow_dispatch'
    environment:
      name: ${{ matrix.environment }}
      url: ${{ matrix.url }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build application
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=${{ matrix.environment }}-
            type=raw,value=${{ matrix.environment }}-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets[format('{0}_SERVER_HOST', matrix.environment | upper)] }}
          username: ${{ secrets[format('{0}_SERVER_USER', matrix.environment | upper)] }}
          key: ${{ secrets[format('{0}_SERVER_SSH_KEY', matrix.environment | upper)] }}
          port: ${{ secrets[format('{0}_SERVER_PORT', matrix.environment | upper)] || 22 }}
          script: |
            set -e
            echo "🚀 Starting deployment to ${{ matrix.environment }}..."
            
            cd ${{ secrets[format('{0}_DEPLOYMENT_PATH', matrix.environment | upper)] }}
            
            # Pull latest code
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            
            # Setup environment
            export NODE_ENV=production
            
            # Install dependencies
            pnpm install --frozen-lockfile
            
            # Build application
            pnpm build
            
            # Restart service
            pm2 restart bayezid_portfolio || pm2 start --name bayezid_portfolio npm -- start
            
            # Wait for server
            sleep 5
            
            echo "✅ Deployment completed successfully!"

      - name: Health check
        id: health
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=1
          URL="${{ matrix.url }}"
          
          echo "🏥 Checking server health at $URL"
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            if curl -f --connect-timeout 5 "$URL" > /dev/null 2>&1; then
              echo "✅ Server is healthy"
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "⏳ Attempt $ATTEMPT/$MAX_ATTEMPTS - waiting for server..."
            sleep 2
            ATTEMPT=$((ATTEMPT + 1))
          done
          
          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1

      - name: Run smoke tests
        if: success()
        run: |
          echo "🧪 Running smoke tests..."
          
          # Example: Check critical endpoints
          endpoints=(
            "${{ matrix.url }}"
            "${{ matrix.url }}/api/health"
          )
          
          for endpoint in "${endpoints[@]}"; do
            if curl -f "$endpoint" > /dev/null 2>&1; then
              echo "✅ $endpoint - OK"
            else
              echo "❌ $endpoint - FAILED"
              exit 1
            fi
          done
        continue-on-error: true

      - name: Notify deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { GITHUB_REPOSITORY } = process.env;
            
            github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: context.payload.deployment.id || 0,
              state: 'success',
              description: '✅ Deployment successful',
              target_url: '${{ matrix.url }}'
            }).catch(() => {
              // Ignore if deployment_id not available
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 **Deployment Successful**\n\n**Environment:** ${{ matrix.environment }}\n**URL:** [${{ matrix.url }}](${{ matrix.url }})\n**Commit:** ${context.sha.substring(0, 7)}`
            }).catch(() => {
              // Ignore if no PR associated
            });

      - name: Notify deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ **Deployment Failed**\n\n**Environment:** ${{ matrix.environment }}\n**Branch:** ${{ github.ref_name }}\n\nPlease check the workflow logs for details.`
            }).catch(() => {
              // Ignore if no PR associated
            });

      - name: Create deployment record
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: '${{ matrix.environment }}',
              description: 'Deployment ${{ job.status }}',
              required_contexts: [],
              auto_merge: false
            });

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    steps:
      - name: Checkout previous version
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Get previous commit
        id: prev
        run: |
          PREV_COMMIT=$(git log --oneline -2 | tail -1 | awk '{print $1}')
          echo "commit=$PREV_COMMIT" >> $GITHUB_OUTPUT

      - name: Rollback application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PRODUCTION_SERVER_HOST }}
          username: ${{ secrets.PRODUCTION_SERVER_USER }}
          key: ${{ secrets.PRODUCTION_SERVER_SSH_KEY }}
          script: |
            set -e
            echo "⏮️ Rolling back to previous version..."
            
            cd ${{ secrets.PRODUCTION_DEPLOYMENT_PATH }}
            git checkout ${{ steps.prev.outputs.commit }}
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart bayezid_portfolio
            
            echo "✅ Rollback completed"
        continue-on-error: true

      - name: Notify rollback
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `⏮️ **Automatic Rollback Triggered**\n\nDeployment failed. Rolling back to previous stable version.\nCommit: ${{ steps.prev.outputs.commit }}`
            }).catch(() => {});
