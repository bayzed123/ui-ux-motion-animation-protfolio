name: Smart Build

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read Package Manager Version
        id: pm
        run: |
          VERSION=$(node -p "require('./package.json').packageManager.match(/pnpm@([0-9]+\.[0-9]+\.[0-9]+)/)?.[1] || ''")
          
          if [ -z "$VERSION" ]; then
            echo "Unable to detect pnpm version from package.json"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected PNPM Version: $VERSION"

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pm.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Verify Project Files
        run: |
          test -f package.json || (echo "package.json missing" && exit 1)

          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found"
          fi

          if [ -f vite.config.ts ]; then
            echo "vite.config.ts found"
          fi

          if [ -f components.json ]; then
            echo "components.json found"
          fi

          if [ -f template.json ]; then
            echo "template.json found"
          fi

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm check

      - name: Build Project
        run: pnpm build

      - name: Verify Build Output
        run: |
          echo "Searching build output..."

          find . -type d \( \
            -name dist -o \
            -name build -o \
            -name .next -o \
            -name out \
          \)

      - name: Build Success
        run: echo "Build completed successfully"