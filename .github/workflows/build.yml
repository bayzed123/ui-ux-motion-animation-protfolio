name: Smart Build

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Files
        run: |
          echo "Checking required files..."

          test -f package.json || (echo "package.json not found" && exit 1)

          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml found"
          else
            echo "pnpm-lock.yaml not found"
          fi

          if [ -f vite.config.ts ]; then
            echo "vite.config.ts found"
          else
            echo "vite.config.ts not found"
          fi

          if [ -f components.json ]; then
            echo "components.json found"
          fi

          if [ -f template.json ]; then
            echo "template.json found"
          fi

      - name: Detect Package Manager
        id: pm
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "manager=pnpm" >> $GITHUB_OUTPUT
          elif [ -f package-lock.json ]; then
            echo "manager=npm" >> $GITHUB_OUTPUT
          elif [ -f yarn.lock ]; then
            echo "manager=yarn" >> $GITHUB_OUTPUT
          else
            echo "manager=npm" >> $GITHUB_OUTPUT
          fi

      - name: Setup PNPM
        if: steps.pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies (PNPM)
        if: steps.pm.outputs.manager == 'pnpm'
        run: pnpm install --frozen-lockfile

      - name: Install Dependencies (NPM)
        if: steps.pm.outputs.manager == 'npm'
        run: npm ci

      - name: Install Dependencies (Yarn)
        if: steps.pm.outputs.manager == 'yarn'
        run: yarn install --frozen-lockfile

      - name: Verify Build Script
        run: |
          node -e "
          const pkg=require('./package.json');
          if(!pkg.scripts?.build){
            console.error('Build script not found in package.json');
            process.exit(1);
          }
          console.log('Build script found:', pkg.scripts.build);
          "

      - name: Build Project (PNPM)
        if: steps.pm.outputs.manager == 'pnpm'
        run: pnpm build

      - name: Build Project (NPM)
        if: steps.pm.outputs.manager == 'npm'
        run: npm run build

      - name: Build Project (Yarn)
        if: steps.pm.outputs.manager == 'yarn'
        run: yarn build

      - name: Detect Build Output
        run: |
          echo "Searching build output..."

          find . -type d \( \
            -name dist -o \
            -name build -o \
            -name .next -o \
            -name out \
          \) | head -20

      - name: Build Success
        run: echo "Build completed successfully"
