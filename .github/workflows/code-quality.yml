name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PNPM_VERSION: 10.4.1
  NODE_VERSION: 20

jobs:
  lint:
    name: ESLint & Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        id: prettier
        run: pnpm format --check
        continue-on-error: true

      - name: Auto-format if needed (on PR)
        if: failure() && github.event_name == 'pull_request'
        run: |
          pnpm format
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-format code" || echo "No changes to commit"
          git push || echo "Push failed"
        continue-on-error: true

      - name: Comment on PR with formatting status
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🎨 Code formatted automatically. Please pull the latest changes.'
            })

  type-check:
    name: TypeScript Strict Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Generate type report
        if: always()
        run: |
          echo "## ✅ TypeScript Check" >> $GITHUB_STEP_SUMMARY
          echo "All type checks passed!" >> $GITHUB_STEP_SUMMARY

  dependency-check:
    name: Dependency Security & Health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        id: audit
        run: pnpm audit
        continue-on-error: true

      - name: Check for outdated packages
        id: outdated
        run: pnpm outdated || true
        continue-on-error: true

      - name: Report dependency status
        if: always()
        run: |
          echo "## 📦 Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Audit Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.audit.outcome }}" = "success" ]; then
            echo "✅ No security vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Review audit results above" >> $GITHUB_STEP_SUMMARY
          fi

  build-check:
    name: Build Verification (Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check before build
        run: pnpm check

      - name: Build with Vite
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_BUILD_TARGET: es2020

      - name: Verify Vite output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          
          echo "✅ Build successful"
          echo ""
          echo "📊 Build Output:"
          ls -lah dist/ | head -20
          echo ""
          
          # Count files
          FILE_COUNT=$(find dist -type f | wc -l)
          JS_COUNT=$(find dist -name '*.js' | wc -l)
          CSS_COUNT=$(find dist -name '*.css' | wc -l)
          
          echo "📈 Statistics:"
          echo "- Total files: $FILE_COUNT"
          echo "- JavaScript bundles: $JS_COUNT"
          echo "- CSS files: $CSS_COUNT"
          echo ""
          
          # Size analysis
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "📦 Bundle Size: $TOTAL_SIZE"

      - name: Analyze bundle structure
        run: |
          echo "## 🏗️ Build Structure Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Total Size" >> $GITHUB_STEP_SUMMARY
          du -h dist >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### JavaScript Bundles" >> $GITHUB_STEP_SUMMARY
          find dist -name '*.js' -type f -exec ls -lh {} \; | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### CSS Files" >> $GITHUB_STEP_SUMMARY
          find dist -name '*.css' -type f -exec ls -lh {} \; | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: Check for source maps
        continue-on-error: true
        run: |
          SOURCEMAPS=$(find dist -name '*.map' | wc -l)
          if [ $SOURCEMAPS -gt 0 ]; then
            echo "⚠️ Warning: Found $SOURCEMAPS source maps in production build"
            echo "Consider disabling source maps in vite.config.ts for production"
          else
            echo "✅ No source maps found (good for production)"
          fi

  lighthouse:
    name: Lighthouse Performance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for production
        run: pnpm build

      - name: Generate Lighthouse report
        continue-on-error: true
        run: |
          npm install -g @lhci/cli@0.9.x lighthouse
          echo "## 🚀 Lighthouse Audit Ready" >> $GITHUB_STEP_SUMMARY
          echo "Run lighthouse locally with: \`lighthouse https://your-site\`" >> $GITHUB_STEP_SUMMARY
